version: '3.8'

services:
  db:
    image: postgres:16.3
    container_name: biblioteca_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: biblioteca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: biblioteca_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/biblioteca
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: biblioteca_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
